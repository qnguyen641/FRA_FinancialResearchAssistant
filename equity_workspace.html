<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora — Equity Research Workspace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1B4D38;--primary-l:rgba(27,77,56,.08);--accent:#4A7C59;
  --green:#2E7D32;--green2:rgba(46,125,50,.1);--red:#C62828;--red2:rgba(198,40,40,.1);
  --amber:#B45309;--amber2:rgba(180,83,9,.09);
  --bg-canvas:#EDE5D8;--bg:#F5F0E8;--surface:#FFFFFF;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.05);
  --text:#1A1A1A;--text2:#3D3D3D;--text3:#6B6B6B;--text4:#9A9A9A;
  --r-card:3px;--r-input:2px;
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:var(--bg-canvas);color:var(--text);height:100vh;display:flex;overflow:hidden}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-thumb{background:#A8C4B2;border-radius:999px}::-webkit-scrollbar-track{background:transparent}
/* sidebar */
.sidebar{width:236px;min-width:236px;background:var(--surface);display:flex;flex-direction:column;height:100vh;box-shadow:1px 0 0 rgba(0,0,0,.09)}
.logo-wrap{padding:18px 16px;border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:var(--primary-l);border:1px solid rgba(27,77,56,.2);border-radius:var(--r-card);display:flex;align-items:center;justify-content:center;color:var(--primary);font-size:19px}
.logo-name{font-weight:800;font-size:13.5px;letter-spacing:-.01em}.logo-sub{font-size:10px;color:rgba(0,0,0,.4);margin-top:1px}
.nav-section{padding:10px 8px;flex:1;overflow-y:auto}
.nav-label{font-size:10px;color:rgba(0,0,0,.38);text-transform:uppercase;letter-spacing:.1em;font-weight:800;padding:0 8px;margin:8px 0 6px}
.nav-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 10px;border-radius:6px;color:rgba(0,0,0,.55);cursor:pointer;margin-bottom:3px;transition:.15s}
.nav-item:hover{background:rgba(0,0,0,.04)}
.nav-item.active{background:var(--primary-l);color:var(--primary);border-left:2px solid var(--primary);padding-left:8px}
.nav-item .t{font-weight:700;font-size:13px}.nav-item .n{font-size:10.5px;color:var(--text4);margin-top:1px}
.nav-item .px{text-align:right}.nav-item .p{font-size:12px;font-variant-numeric:tabular-nums;color:var(--text2)}.nav-item .c{font-size:10.5px;font-variant-numeric:tabular-nums}
.up{color:var(--green)}.dn{color:var(--red)}
.sidebar-footer{padding:12px 14px;border-top:1px solid rgba(0,0,0,.08);display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text4)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px rgba(74,124,89,.25)}50%{box-shadow:0 0 0 5px rgba(74,124,89,.08)}}
/* main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:56px;background:var(--surface);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 26px;gap:10px;flex-shrink:0}
.tb-l{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.tb-l h1{font-size:16px;font-weight:800;letter-spacing:-.01em}.tb-l .tk{font-size:11px;color:var(--text4);text-transform:uppercase;letter-spacing:.06em}
.tb-r{display:flex;align-items:center;gap:10px}
.tb-price{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums}
.chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:2px}
.chip.up{background:var(--green2);color:#1B5E20}.chip.dn{background:var(--red2);color:#991B1B}
.rbadge{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:2px}
.rb-green{background:var(--green2);color:#1B5E20}.rb-amber{background:var(--amber2);color:#92400E}.rb-red{background:var(--red2);color:#991B1B}
.export-btn{border:1px solid rgba(27,77,56,.3);background:var(--primary-l);border-radius:var(--r-input);padding:8px 13px;font-size:11px;font-weight:800;letter-spacing:.03em;color:var(--primary);cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit}
.export-btn:hover{background:rgba(27,77,56,.15)}
.export-btn.solid{background:var(--primary);color:#fff;border-color:var(--primary)}
/* page */
.page{flex:1;overflow-y:auto;padding:24px 26px;display:flex;flex-direction:column;gap:22px}
.section-hd{display:flex;align-items:center;gap:14px;border-left:3px solid var(--primary);padding-left:12px}
.section-hd span{font-size:16px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;color:var(--text)}
.research-box{display:flex;gap:6px;padding:0 4px 4px}
.research-box input{flex:1;min-width:0;background:var(--bg);border:1px solid var(--border);border-radius:var(--r-input);padding:8px 10px;font-size:12px;font-family:inherit;color:var(--text)}
.research-box button{border:1px solid var(--primary);background:var(--primary);color:#fff;border-radius:var(--r-input);padding:0 11px;font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:4px;font-family:inherit}
.pipe-wrap{display:flex;justify-content:center;padding:34px 0}
.pipe-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:26px 28px;max-width:560px;width:100%}
.pipe-h{font-size:19px;font-weight:800;display:flex;align-items:center;gap:9px}.pipe-h i{color:var(--primary)}
.pipe-sub{font-size:12px;color:var(--text4);margin:5px 0 18px}
.pstep{display:flex;align-items:center;gap:11px;padding:10px 0;border-top:1px solid var(--border2);opacity:.42;transition:opacity .25s}
.pstep:first-child{border-top:none}.pstep.run,.pstep.done{opacity:1}
.pstep .pdot{color:var(--text4);font-size:18px;display:flex}.pstep.done .pdot{color:var(--primary)}
.pstep .pl{font-size:13.5px;font-weight:700}.pstep .pd{font-size:11px;color:var(--text4)}
.pstep .pstat{margin-left:auto;color:var(--primary);font-size:16px;display:flex;min-width:18px;justify-content:center}
.spin{animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.section-hd .prov{margin-left:auto}
.section-hd::after{content:'';flex:0;width:0}
.prov{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:2px;border:1px solid var(--border);display:inline-flex;align-items:center;gap:3px;color:var(--text4);background:rgba(0,0,0,.02)}
.prov i{font-size:9px}.prov.det{color:var(--primary);border-color:rgba(27,77,56,.3);background:var(--primary-l)}
.cards{display:grid;gap:18px}.g4{grid-template-columns:repeat(4,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:1050px){.g4{grid-template-columns:repeat(2,1fr)}.g3,.g2{grid-template-columns:1fr}}
@media(max-width:680px){.sidebar{display:none}.g4{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:20px}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:800;color:var(--text4)}
.card-value{font-size:clamp(18px,2vw,25px);font-weight:800;line-height:1.1;letter-spacing:-.03em;margin-top:12px;font-variant-numeric:tabular-nums}
.card-sub{font-size:10.5px;color:var(--text3);margin-top:5px}
.stat-icon{width:36px;height:36px;border-radius:var(--r-card);background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon i{font-size:18px;color:rgba(255,255,255,.92)}
.chart-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-card);padding:20px}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:-20px -20px 18px;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg-canvas);border-radius:var(--r-card) var(--r-card) 0 0}
.chart-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.03em;display:flex;align-items:center;gap:8px}
.chart-title .sub{font-weight:400;text-transform:none;letter-spacing:0;color:var(--text4);font-size:10px}
.chart-wrap{position:relative;height:230px}.chart-wrap-sm{position:relative;height:175px}
.chart-wrap canvas{width:100%!important;height:100%!important;display:block}
.ohlc-readout{display:flex;flex-wrap:wrap;gap:14px;align-items:center;font-size:11px;color:var(--text3);margin-bottom:10px}
.ohlc-readout b{color:var(--text);font-weight:700;font-variant-numeric:tabular-nums}
.period-btns{display:flex;gap:2px;background:rgba(0,0,0,.06);border-radius:var(--r-input);padding:3px}
.period-btn{font-size:10px;padding:4px 10px;border:none;background:transparent;color:var(--text3);cursor:pointer;font-family:inherit;font-weight:700;border-radius:2px}
.period-btn.active{background:var(--surface);color:var(--text);border-bottom:2px solid var(--primary)}
.thesis{border:1px solid var(--border);border-left:3px solid var(--amber);background:#fcfaf4;border-radius:0 var(--r-card) var(--r-card) 0;padding:14px 16px;font-size:13.5px;line-height:1.7}
.thesis .fig,p .fig{font-weight:700}
p.prose{line-height:1.7;margin-bottom:11px;font-size:13px}p.prose:last-child{margin-bottom:0}
sup.c{color:var(--primary);font-weight:800;font-size:9px}
.tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mini .v{font-size:16px;font-weight:800;font-variant-numeric:tabular-nums}.mini .k{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text4);margin-top:2px}
table.dt{width:100%;border-collapse:collapse;font-size:11.5px}
table.dt th{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--text4);font-weight:800;padding:9px 10px;text-align:right;border-bottom:1px solid var(--border);background:rgba(0,0,0,.02)}
table.dt th:first-child,table.dt td:first-child{text-align:left}
table.dt td{padding:9px 10px;border-bottom:1px solid var(--border2);text-align:right;font-variant-numeric:tabular-nums}
table.dt td:first-child{color:var(--text3)}table.dt tr:last-child td{border-bottom:none}
.subh{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--text4);margin-bottom:7px}
.vtrack{position:relative;height:7px;background:rgba(0,0,0,.08);border-radius:5px;margin:30px 0 8px}
.vband{position:absolute;height:7px;background:var(--primary);border-radius:5px}
.vt{position:absolute;top:-6px;width:2px;height:19px;background:var(--text)}
.vt.base{background:var(--primary);width:3px}.vt.price{background:var(--amber)}
.vt .cap{position:absolute;top:-18px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10px;color:var(--text3)}
.vt.price .cap{color:var(--amber);font-weight:700}
.vends{display:flex;justify-content:space-between;font-size:10.5px;color:var(--text4)}
ul.list{list-style:none}ul.list li{padding:8px 0;border-top:1px solid var(--border2);font-size:12.5px;display:flex;gap:9px;line-height:1.5}
ul.list li:first-child{border-top:none}ul.list li .mk{color:var(--primary);font-weight:800;flex-shrink:0}
.news{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--border2)}.news:first-of-type{border-top:none}
.news .stripe{width:3px;border-radius:2px;flex-shrink:0}.stripe.pos{background:var(--green)}.stripe.neg{background:var(--red)}.stripe.neu{background:var(--text4)}
.news .hd{font-size:12.5px;font-weight:600;line-height:1.4}.news .mt{font-size:10.5px;color:var(--text4);margin-top:3px}
.tag{font-size:9px;font-weight:800;text-transform:uppercase;padding:1px 6px;border-radius:2px;margin-left:6px}
.tag.pos{background:var(--green2);color:#1B5E20}.tag.neg{background:var(--red2);color:#991B1B}.tag.neu{background:rgba(0,0,0,.06);color:var(--text3)}
.cat{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--border2);font-size:12.5px}.cat:first-child{border-top:none}.cat .meta{font-size:10.5px;color:var(--text4);white-space:nowrap}
.alert{border:1px solid var(--border);border-radius:var(--r-card);padding:13px 15px;background:var(--surface);display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.alert:last-child{margin-bottom:0}
.alert-strip{width:4px;align-self:stretch;border-radius:4px;flex-shrink:0}
.alert-title{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:8px}
.alert-body{font-size:11.5px;color:var(--text2);margin-top:3px;line-height:1.5}
.ill{font-size:10px;color:var(--text4);font-style:italic}
.foot-src{font-size:10px;color:var(--text4);margin-top:10px;line-height:1.5}
/* report */
#report{display:none}
body.reportmode .page#dash{display:none}
body.reportmode #report{display:flex;flex-direction:column;flex:1;overflow-y:auto;padding:20px 26px}
.rtoolbar{max-width:840px;margin:0 auto 0;width:100%;display:flex;justify-content:space-between;padding-bottom:14px}
.doc{max-width:840px;margin:0 auto;background:#fff;border:1px solid var(--border);padding:46px 54px}
.doc .cover{background:#1A3D2A;color:#fff;border-radius:var(--r-card);padding:36px 30px;text-align:center;margin-bottom:24px}
.doc .cover .er{color:#C4B47A;letter-spacing:.2em;font-size:11px;font-weight:800}
.doc .cover h1{font-size:32px;margin:8px 0 4px;font-weight:900;letter-spacing:-.02em}
.doc .cover .tk{color:#aebfb4;font-size:13px}.doc .cover .rt{color:#C4B47A;font-weight:800;font-size:17px;margin-top:14px}
.doc .cover .ct{color:#d6e0d8;font-size:12.5px}.doc .cover .dt{color:#8ea99a;font-size:11px;margin-top:9px}
.doc h2.s{color:var(--primary);font-size:18px;margin:24px 0 9px;padding-bottom:6px;border-bottom:2px solid var(--border);font-weight:800}
.doc h3.s{font-size:13px;margin:14px 0 5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text3)}
.doc p{line-height:1.7;margin-bottom:10px;font-size:13px}
.doc .kvbox{border:1px solid #ecdcb8;background:#fcfaf4;border-radius:var(--r-card);padding:13px 15px;font-size:13px;line-height:1.7}
.doc .disc{margin-top:22px;padding-top:12px;border-top:1px solid var(--border);color:var(--text4);font-size:10px;line-height:1.6}
@media print{.sidebar,.topbar,.rtoolbar{display:none!important}body{display:block;height:auto;overflow:visible}.doc{border:none;margin:0;max-width:none;padding:0}body.reportmode #report{padding:0}}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="logo-wrap"><div class="logo-icon"><i class="ti ti-chart-candle"></i></div>
    <div><div class="logo-name">Aurora</div><div class="logo-sub">Equity Research</div></div></div>
  <div class="nav-section">
    <div class="nav-label">Live research</div>
    <div class="research-box">
      <input id="tkInput" placeholder="Type a ticker… e.g. MSFT" onkeydown="if(event.key==='Enter')runResearch()" />
      <button onclick="runResearch()"><i class="ti ti-search"></i>Run</button>
    </div>
    <div class="nav-label" style="margin-top:14px">Coverage</div><div id="wl"></div>
  </div>
  <div class="sidebar-footer"><span class="live-dot"></span><span>Mock demo · illustrative price &amp; news</span></div>
</aside>
<div class="main">
  <div class="topbar" id="topbar"></div>
  <div class="page" id="dash"></div>
  <div id="report"></div>
</div>

<script>
const DATA = {
 "AAPL":{name:"Apple Inc.",ticker:"AAPL",exchange:"NASDAQ",sector:"Technology",cur:"$",

   thesis:`Apple maintains robust financial health, with revenue projected at a <span class="fig">3.3% CAGR</span> through 2027 and EBITDA margin forecast toward <span class="fig">44.8% by 2027</span>. Contribution margin keeps improving on disciplined cost management and EPS is expected to grow consistently. The tension is valuation: at 34× forward earnings the shares already price in much of this, and our model puts fair value below the current price.`,
   overview:[`Apple Inc. is a global technology leader spanning hardware, software and a fast-growing services ecosystem — iPhone, iPad, Mac, Apple Watch and AirPods, complemented by the App Store, Apple Music, iCloud, Apple TV+ and Apple Pay. The integrated model fosters loyalty and recurring services revenue.`,
     `Revenue reached <span class="fig">$416.2B in 2025</span> (+6.4%), with consensus near $482B by 2027. Contribution margin has risen from 41.8% (2021) to 46.9% (2025), EBITDA margins are expanding, and EPS reached $7.49. Strategic focus on high-margin services, ecosystem expansion and cost control underpins the outlook, alongside heavy AI, wearables and AR investment.`],

   news:[{d:"2026-06-08",s:"Wedbush",t:"pos",h:"WWDC marks the start of Apple's AI consumer-platform shift"},
         {d:"2026-06-08",s:"Reuters",t:"neg",h:"Apple shares slip post-keynote as AI reveal underwhelms expectations"},

const C_UP="#2EA37D",C_DN="#E2574B";
function fmtTs(dt,fmt){
  if(fmt==="time")return dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
  if(fmt==="daytime")return dt.toLocaleDateString('en-US',{weekday:'short'});
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function genOHLC(tk,end,cfg){
  let h=0;for(const c of (tk+cfg.iv))h=(h*131+c.charCodeAt(0))>>>0;
  const rnd=()=>{h^=h<<13;h>>>=0;h^=h>>17;h^=h<<5;h>>>=0;return (h>>>0)/4294967296;};
  const n=cfg.n,out=[];let prev=end*(0.84+rnd()*0.06);
  for(let i=0;i<n;i++){const o=prev,c=o*(1+(rnd()-0.47)*cfg.vol*2),
    hi=Math.max(o,c)*(1+rnd()*cfg.vol),lo=Math.min(o,c)*(1-rnd()*cfg.vol);
    out.push({o,h:hi,l:lo,c});prev=c;}
  const k=end/out[n-1].c;out.forEach(d=>{d.o*=k;d.h*=k;d.l*=k;d.c*=k;});
  const now=new Date();
  out.forEach((d,i)=>{const dt=new Date(now.getTime()-(n-1-i)*cfg.stepMin*60000);d.t=fmtTs(dt,cfg.fmt);});
  return out;}
const OHLC={};let pxHover=null;
function priceChart(){const d=DATA[STATE.ticker],cfg=PCFG[STATE.period],key=STATE.ticker+STATE.period;
  if(!OHLC[key])OHLC[key]=genOHLC(STATE.ticker,d.price,cfg);pxHover=null;drawCandles();}
function drawCandles(){
  const cv=document.getElementById('priceChart');if(!cv)return;
  const d=DATA[STATE.ticker],cfg=PCFG[STATE.period],data=OHLC[STATE.ticker+STATE.period];if(!data)return;
  const dpr=window.devicePixelRatio||1,cssW=cv.clientWidth||cv.parentNode.clientWidth,cssH=cv.clientHeight||230;
  cv.width=cssW*dpr;cv.height=cssH*dpr;const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,cssW,cssH);
  const padT=8,padB=22,padR=54,padL=8,pw=cssW-padL-padR,ph=cssH-padT-padB;
  let lo=Infinity,hi=-Infinity;data.forEach(c=>{if(c.l<lo)lo=c.l;if(c.h>hi)hi=c.h;});
  const rng=(hi-lo)||1;lo-=rng*0.06;hi+=rng*0.06;const Y=v=>padT+ph-((v-lo)/(hi-lo))*ph;
  const n=data.length,step=pw/n,bw=Math.max(1.5,Math.min(11,step*0.62));
  ctx.font="10px Inter,sans-serif";ctx.textBaseline="middle";
  for(let i=0;i<=5;i++){const val=lo+(hi-lo)*i/5,y=Y(val);
    ctx.strokeStyle="rgba(0,0,0,.05)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(padL+pw,y);ctx.stroke();
    ctx.fillStyle="#9A9A9A";ctx.textAlign="left";
    ctx.fillText(d.cur+(val>=1000?(val/1000).toFixed(0)+'k':val.toFixed(val<10?2:0)),padL+pw+6,y);}
  data.forEach((c,i)=>{const x=padL+step*(i+0.5),up=c.c>=c.o,col=up?C_UP:C_DN;
    ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,Y(c.h));ctx.lineTo(x,Y(c.l));ctx.stroke();
    const yo=Y(c.o),yc=Y(c.c),top=Math.min(yo,yc),hgt=Math.max(1,Math.abs(yc-yo));ctx.fillRect(x-bw/2,top,bw,hgt);
    if(pxHover===i){ctx.strokeStyle="rgba(0,0,0,.28)";ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(x,padT);ctx.lineTo(x,padT+ph);ctx.stroke();ctx.setLineDash([]);}});
  ctx.fillStyle="#9A9A9A";ctx.textAlign="center";ctx.textBaseline="top";
  const every=Math.max(1,Math.floor(n/Math.min(7,n)));
  data.forEach((c,i)=>{if(i%every===0){const x=padL+step*(i+0.5);ctx.fillText(c.t,x,padT+ph+6);}});
  updateReadout(pxHover==null?data[n-1]:data[pxHover],data);}
function updateReadout(c,data){const el=document.getElementById('pxOHLC');if(!el)return;const d=DATA[STATE.ticker];

    <span class="chip ${chg>=0?'up':'dn'}">${sgn(chg)} · ${STATE.period}</span><span class="ill">${c.t} · ${PCFG[STATE.period].iv} candles</span>`;}
function priceHover(e){const cv=document.getElementById('priceChart');if(!cv)return;const data=OHLC[STATE.ticker+STATE.period];if(!data)return;
  const r=cv.getBoundingClientRect(),x=e.clientX-r.left,cssW=cv.clientWidth,padL=8,padR=54,pw=cssW-padL-padR,n=data.length,step=pw/n;
  let idx=Math.floor((x-padL)/step);idx=Math.max(0,Math.min(n-1,idx));if(idx!==pxHover){pxHover=idx;drawCandles();}}

  <div class="section-hd"><span>Valuation</span><span class="prov det"><i class="ti ti-database"></i> deterministic</span></div>
  <div class="card"><div class="cards g2"><div>${valbar(d)}</div><div><p class="prose">${d.valuation}</p></div></div></div>

    <div class="chart-box"><div class="chart-hdr"><div class="chart-title"><i class="ti ti-chart-bar" style="color:var(--primary)"></i> Peer comparison <span class="sub">${d.peers.title}</span></div></div><div class="chart-wrap-sm"><canvas id="peerChart"></canvas></div><div class="ill" style="margin-top:8px">${d.peers.note}</div></div>

      <div class="subh" style="margin-top:12px">Confidence / range</div><table class="dt">${d.sens.ci.map(a=>`<tr><td>${a[0]}</td><td>${a[1]}</td></tr>`).join("")}</table></div>
  </div>

  <div class="section-hd"><span>Market &amp; news</span><span class="prov"><i class="ti ti-flask"></i> illustrative</span></div>
  <div class="cards g2">
    <div class="card"><div class="subh">Recent news &amp; events</div><p class="prose" style="font-size:12.5px">${d.newsSummary}</p>${newsH(d.news)}</div>

      <div class="subh" style="margin-top:16px">Risk factors</div>${listH(d.risks,"■")}</div>

  <div class="section-hd"><span>Verification gate</span><span class="prov det"><i class="ti ti-shield-check"></i> our flavor</span></div>
  <div class="card">${checksH(d.checks)}
    <div class="foot-src">Every figure traces to the engine; every claim is cited. Sources: ${d.citations.map((c,i)=>`[${i+1}] ${c}`).join(" · ")}.</div></div>
  <div style="height:8px"></div>`;
  priceChart();revChart('revChart',d);epsChart('epsChart',d);peerChart('peerChart',d);}

    Every figure is produced by a deterministic engine; the AI composes the narrative but does not originate numbers. Qualitative claims are grounded in the cited sources and assumptions are screened by the verification gate — items that fail are flagged, not silently published. Illustrative mock data for demonstration only. Not investment advice.</div>

/* ── Live research: procedural company generation + pipeline animation ── */
const SECTORS=["Technology","Healthcare","Financials","Energy","Consumer Goods","Industrials","Communication Services","Materials"];
const EXCH=["NYSE","NASDAQ","LSE","TSX","ASX"];
function rngFrom(seed){let h=0;for(const c of seed)h=(h*131+c.charCodeAt(0))>>>0;
  return ()=>{h^=h<<13;h>>>=0;h^=h>>17;h^=h<<5;h>>>=0;return (h>>>0)/4294967296;};}
function bn(x){return x>=1000?"$"+(x/1000).toFixed(1)+"B":"$"+Math.round(x)+"M";}
function generateCompany(tk){
  const r=rngFrom(tk+"v1");
  const sector=SECTORS[Math.floor(r()*SECTORS.length)], exch=EXCH[Math.floor(r()*EXCH.length)];
  const price=+(25+r()*340).toFixed(2), day=+(((r()-0.5)*0.045)).toFixed(4), shares=Math.round(150+r()*3500);
  const years=["2021A","2022A","2023A","2024A","2025A"], yLbl=["2021","2022","2023","2024","2025"];
  const rev=[];let v=Math.round(3000+r()*55000);for(let i=0;i<5;i++){rev.push(Math.round(v));v*=(1+(0.04+r()*0.20)*(0.6+r()*0.8));}
  const nMar=0.07+r()*0.22, eMar=nMar+0.06+r()*0.12;
  const ni=rev.map(x=>Math.round(x*nMar*(0.92+r()*0.16))), ebitda=rev.map(x=>Math.round(x*eMar));
  const eps=ni.map(x=>+(x/shares).toFixed(2)), peNow=price/(eps[4]||1);
  const pe=eps.map((e,i)=>+(peNow*(0.78+0.06*i)*(0.95+r()*0.1)).toFixed(1));
  const equity=Math.round(rev[4]*(0.4+r()*0.5)), roe=ni[4]/equity, dte=+(0.3+r()*1.8).toFixed(2);
  const histCAGR=Math.pow(rev[4]/rev[0],1/4)-1, fcf=ebitda[4]*(0.55+r()*0.2), fwdG=histCAGR*(0.7+r()*0.7);
  const wacc=0.10,tg=0.025;let pv=0,f=fcf;for(let i=1;i<=5;i++){f*=(1+fwdG);pv+=f/Math.pow(1+wacc,i);}
  const tv=(f*(1+tg)/(wacc-tg))/Math.pow(1+wacc,5), ev=pv+tv;
  let base=+(((ev-equity*dte*0.2+rev[4]*0.05)/shares)).toFixed(2);if(base<price*0.3)base=+(price*(0.6+r()*0.6)).toFixed(2);
  const low=+(base*0.86).toFixed(2),high=+(base*1.17).toFixed(2),upside=(base-price)/price;
  const flagged=fwdG>histCAGR*1.5&&fwdG>0.13;
  let rating,rcls,target=null,fairLow=null,fairHigh=null,fairMethod;
  if(flagged){rating="Under review";rcls="amber";fairMethod="DCF withheld — growth assumption flagged";}
  else{target=base;fairLow=low;fairHigh=high;fairMethod="5-year DCF · WACC 10% · terminal g 2.5%";
    rating=upside>0.15?"Undervalued":upside<-0.15?"Overvalued":"Fairly valued";rcls=upside>0.15?"green":upside<-0.15?"red":"amber";}
  const moneyB=a=>a.map(x=>"$"+(x/1000).toFixed(1)+"B");
  return {name:tk+" · live research",ticker:tk,exchange:exch,sector,cur:"$",price,dayChange:day,rating,ratingClass:rcls,
    target,fairLow,fairHigh,fairMethod,generated:true,
    metrics:[["Market cap",bn(price*shares)],["P/E (fwd)",peNow.toFixed(1)+"x"],["P/B ratio",(price/(equity/shares)).toFixed(2)+"x"],
      ["ROE",pct(roe)],["Div yield",pct(r()*0.03)],["52W range","$"+(price*0.82).toFixed(0)+"–$"+(price*1.16).toFixed(0)]],
    thesis:`${tk} operates in ${sector.toLowerCase()}. On our five-year DCF, fair value is <span class="fig">$${base}</span> against the current $${price}, ${flagged?'but the model is parked under review — the forward growth assumption runs ahead of history':`implying <span class="fig">${sgn(upside)}</span> ${upside>=0?'upside':'downside'}`}. The business shows a <span class="fig">${pct(roe)}</span> return on equity and a ${pct(nMar)} net margin, with revenue compounding at a ${pct(histCAGR)} historical CAGR.`,
    overview:[`${tk} is a ${sector.toLowerCase()} company listed on ${exch}. This profile was assembled on demand by the research pipeline from (illustrative) financial statements, filings and news — showing the system can cover names beyond the static watchlist, not just hand-curated tickers.`,
      `Revenue reached <span class="fig">$${(rev[4]/1000).toFixed(1)}B</span> in 2025 with net income of $${(ni[4]/1000).toFixed(1)}B (${pct(nMar)} margin) and EPS of $${eps[4]}. The deterministic engine computed every figure shown here; the narrative is composed around those numbers and screened by the verification gate.`],
    chartRev:{years:yLbl,bars:rev.map(x=>+(x/1000).toFixed(1)),line:ebitda.map(x=>+(x/1000).toFixed(1)),lblBar:"Revenue $B",lblLine:"EBITDA $B"},
    chartEps:{years:yLbl,a:eps,b:pe,la:"EPS $",lb:"P/E x"},
    income:{years,rows:[["Revenue",moneyB(rev)],["EBITDA",moneyB(ebitda)],["EBITDA margin",ebitda.map((e,i)=>pct(e/rev[i]))],
      ["Net income",moneyB(ni)],["Net margin",ni.map((x,i)=>pct(x/rev[i]))],["EPS",eps.map(x=>x.toFixed(2))],
      ["P/E ratio",pe.map(x=>x.toFixed(1))],["Revenue growth",rev.map((x,i)=>i===0?"—":pct((rev[i]-rev[i-1])/rev[i-1]))]]},
    credit:{years,rows:[["Debt / equity",years.map((_,i)=>(dte*(1.12-0.04*i)).toFixed(2))],
      ["ROE",ni.map((x,i)=>pct(x/(equity*(0.8+0.05*i))))],["Net margin",ni.map((x,i)=>pct(x/rev[i]))],
      ["Current ratio",years.map(()=>(0.9+r()*1.1).toFixed(2))]]},
    valuation:`At ${peNow.toFixed(1)}× forward earnings, ${tk} ${upside>=0?'trades below':'trades above'} our intrinsic estimate. ${flagged?'A DCF is computable, but the verification gate withholds a target until the growth assumption is justified.':`Our base-case DCF of <span class="fig">$${base}</span> (range $${low}–$${high}) implies ${sgn(upside)} versus the current price.`}<sup class="c">[3]</sup>`,
    peers:{title:"Forward P/E (peers)",cats:[tk,"Peer A","Peer B"],vals:[+peNow.toFixed(1),+(peNow*(0.78+r()*0.3)).toFixed(1),+(peNow*(1.05+r()*0.4)).toFixed(1)],
      note:`Peer multiples are illustrative; a live run would pull a sector comp set for ${sector.toLowerCase()}.`},
    sens:{assumptions:[["Forward FCF growth",pct(fwdG)],["Historical CAGR",pct(histCAGR)],["WACC","10.0%"],["Terminal growth","2.5%"]],
      ci:flagged?[["Status","DCF withheld pending review"],["Trigger","Growth > 1.5× historical CAGR"]]:[["DCF range","$"+low+" – $"+high],["Implied upside",sgn(upside)]]},
    newsSummary:`Recent flow on ${tk} is mixed. These headlines are generated by the pipeline as a placeholder for a live news and sentiment feed.<sup class="c">[4]</sup>`,
    news:[{d:"1 day ago",s:"Newswire",t:"pos",h:`${tk} posts quarterly results modestly ahead of consensus`},
      {d:"4 days ago",s:"MarketWatch",t:"neu",h:`Analysts weigh ${tk} valuation after a strong run`},
      {d:"1 week ago",s:"Bloomberg",t:r()>0.5?"neg":"pos",h:`${sector} outlook shifts on macro data`}],
    catalysts:[["Next quarterly earnings","~2026-08 · medium"],["Sector / macro catalyst","ongoing · low"]],
    risks:[`Revenue growth could decelerate from the ${pct(histCAGR)} historical pace.`,
      `Re-rating risk if the ${peNow.toFixed(1)}× multiple compresses toward peers.`,
      `Margin pressure from competition or input-cost inflation.`,
      `Execution and macro sensitivity within ${sector.toLowerCase()}.`],
    takeaways:[`${pct(roe)} ROE indicates efficient use of capital.`,`Margins are ${nMar>0.15?'healthy':'modest'} at ${pct(nMar)} net.`,
      `Cash generation supports the valuation case.`,flagged?`Growth assumption flagged — treat the DCF with caution.`:`Valuation rests on assumptions consistent with history.`],
    checks:[{level:"ok",code:"CFO vs NI",message:"Operating cash flow tracks net income — no earnings-quality flag."},
      flagged?{level:"alert",code:"Growth",message:`Forward growth ${pct(fwdG)} exceeds the ${pct(histCAGR)} historical CAGR — DCF target withheld pending verification.`}
             :{level:"ok",code:"Growth",message:`Forward growth ${pct(fwdG)} is consistent with the ${pct(histCAGR)} historical CAGR.`},
      dte>2?{level:"warning",code:"Leverage",message:`Debt/equity of ${dte}× is elevated — note in the risk section.`}
           :{level:"ok",code:"Leverage",message:`Debt/equity of ${dte}× is manageable.`}],
    citations:[`${tk} latest annual filing — MD&A (mock)`,`${tk} latest annual filing — Risk Factors (mock)`,
      "FMP / market data — statements & multiples (mock)","Aggregated news & sentiment (mock)"]};}

const STEPS=[["Resolving ticker","Looking up company profile & listing"],
  ["Fetching financials","Income statement, balance sheet, cash flow"],
  ["Computing ratios & DCF","Deterministic engine — no AI numbers"],
  ["Retrieving filings","RAG over MD&A and risk factors"],
  ["Fetching news & sentiment","Headlines and social signals"],
  ["Running verification gate","Reconcile figures, flag assumptions"],
  ["Composing sections","Grounded narrative with citations"],
  ["Rendering workspace","Candlesticks, charts, tables"]];
async function runResearch(){
  const inp=document.getElementById('tkInput');let tk=((inp&&inp.value)||'').toUpperCase().replace(/[^A-Z0-9.]/g,'').slice(0,6);
  if(!tk)return;
  document.body.classList.remove('reportmode');
  document.getElementById('topbar').innerHTML=`<div class="tb-l"><h1>Researching ${tk}…</h1></div>`;
  document.getElementById('dash').innerHTML=`<div class="pipe-wrap"><div class="pipe-card">
    <div class="pipe-h"><i class="ti ti-radar-2"></i> Researching <span style="color:var(--primary)">${tk}</span></div>
    <div class="pipe-sub">Running the live research pipeline — illustrative mock retrieval</div>
    ${STEPS.map((s,i)=>`<div class="pstep" id="ps${i}"><span class="pdot"><i class="ti ti-circle"></i></span><div><div class="pl">${s[0]}</div><div class="pd">${s[1]}</div></div><span class="pstat" id="pt${i}"></span></div>`).join("")}
  </div></div>`;
  for(let i=0;i<STEPS.length;i++){
    const row=document.getElementById('ps'+i);row.classList.add('run');
    document.getElementById('pt'+i).innerHTML='<i class="ti ti-loader-2 spin"></i>';
    await new Promise(res=>setTimeout(res,340+Math.random()*430));
    row.classList.remove('run');row.classList.add('done');
    row.querySelector('.pdot').innerHTML='<i class="ti ti-circle-check"></i>';
    document.getElementById('pt'+i).innerHTML='<i class="ti ti-check"></i>';
  }
  await new Promise(res=>setTimeout(res,260));
  DATA[tk]=generateCompany(tk);if(inp)inp.value='';show(tk);
}

function show(t){STATE.ticker=t;renderWL();renderTop(DATA[t]);renderDash();
  if(document.body.classList.contains('reportmode'))renderReport();
  document.getElementById('dash').scrollTop=0;}
function openReport(){renderReport();document.body.classList.add('reportmode');}
function closeReport(){document.body.classList.remove('reportmode');}
show("AAPL");
</script>
