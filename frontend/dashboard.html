<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aurora — Equity Research Workspace</title>
<style>
  :root{
    --bg:#eef1f5; --side:#0f1c2e; --side2:#16263c; --sideln:#24364f;
    --card:#fff; --ink:#16202c; --body:#3c4654; --muted:#7b8696; --faint:#aab2bf;
    --rule:#e6e9ee; --rule2:#f0f2f6; --navy:#1b4a7a; --accent:#2563d1;
    --green:#138a52; --greenbg:#e7f4ec; --red:#c43c30; --redbg:#fbeae8; --amber:#9a6a16; --amberbg:#f7efdd;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--body);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.55;}
  .app{display:flex;min-height:100vh;}
  .side{width:226px;flex:none;background:var(--side);color:#cdd6e2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;}
  .logo{padding:20px 20px 14px;font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;gap:9px;}
  .logo .dot{width:10px;height:10px;border-radius:50%;background:var(--accent);}
  .logo small{display:block;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#8b97ab;font-weight:500;margin-top:2px;}
  .wl-label{padding:8px 20px;font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:#67758c;}
  .wl{padding:0 12px;}
  .wlrow{display:flex;justify-content:space-between;padding:10px;border-radius:9px;cursor:pointer;margin-bottom:2px;}
  .wlrow:hover{background:var(--side2);}
  .wlrow.active{background:var(--side2);box-shadow:inset 3px 0 0 var(--accent);}
  .wlrow .t{font-weight:600;color:#fff;font-size:13.5px;} .wlrow .n{font-size:11px;color:#8b97ab;margin-top:1px;}
  .wlrow .px{text-align:right;} .wlrow .px .p{font-size:13px;color:#e6ebf2;} .wlrow .px .c{font-size:11px;}
  .up{color:var(--green);} .dn{color:var(--red);}
  .side .foot{margin-top:auto;padding:14px 20px;font-size:10px;color:#5d6b81;border-top:1px solid var(--sideln);}
  .main{flex:1;min-width:0;}
  .topbar{background:var(--card);border-bottom:1px solid var(--rule);padding:14px 26px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:6;}
  .tb-l{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
  .tb-l h1{margin:0;font-size:19px;font-weight:700;color:var(--ink);}
  .tb-l .tk{color:var(--muted);font-size:12.5px;}
  .tb-r{display:flex;align-items:center;gap:12px;}
  .tb-price .p{font-size:20px;font-weight:700;color:var(--ink);}
  .chip{padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;}
  .chip.up{background:var(--greenbg);color:var(--green);} .chip.dn{background:var(--redbg);color:var(--red);}
  .rchip{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid var(--rule);}
  .rchip.green{background:var(--greenbg);color:var(--green);border-color:#cfe7d8;}
  .rchip.amber{background:var(--amberbg);color:var(--amber);border-color:#ecdcb8;}
  .rchip.red{background:var(--redbg);color:var(--red);border-color:#efcec9;}
  .btn{padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;cursor:pointer;border:1px solid var(--navy);background:var(--navy);color:#fff;}
  .btn.ghost{background:#fff;color:var(--navy);}
  .content{padding:20px 26px 60px;}
  .mockbar{background:var(--amberbg);color:var(--amber);font-size:11.5px;font-weight:600;padding:7px 14px;border-radius:8px;margin-bottom:16px;display:inline-block;}
  .card{background:var(--card);border:1px solid var(--rule);border-radius:12px;padding:18px 20px;margin-bottom:16px;}
  .card h3{margin:0 0 13px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
  .grid3{display:grid;grid-template-columns:1.5fr 1fr;gap:16px;align-items:start;}
  @media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr;}}
  @media(max-width:680px){.side{display:none;}}
  .hero{display:grid;grid-template-columns:1.2fr 1fr;gap:18px;}
  @media(max-width:760px){.hero{grid-template-columns:1fr;}}
  .spark{width:100%;height:120px;}
  .snap{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--rule);border:1px solid var(--rule);border-radius:10px;overflow:hidden;}
  .snap div{background:var(--card);padding:10px 13px;}
  .snap .k{font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);}
  .snap .v{font-size:17px;font-weight:700;color:var(--ink);margin-top:2px;}
  .snap .v.green{color:var(--green);} .snap .v.red{color:var(--red);} .snap .v.amber{color:var(--amber);}
  .tiles{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .tile{border:1px solid var(--rule);border-radius:9px;padding:10px 12px;}
  .tile .v{font-size:16px;font-weight:700;color:var(--ink);} .tile .k{font-size:10px;color:var(--muted);text-transform:uppercase;margin-top:1px;}
  .thesis{border-left:3px solid var(--amber);background:#fcfaf4;border-radius:0 8px 8px 0;padding:13px 16px;font-size:14px;line-height:1.7;color:var(--ink);}
  p.prose{margin:0 0 11px;line-height:1.7;} p.prose:last-child{margin-bottom:0;}
  p.prose .fig{font-weight:600;color:var(--ink);}
  sup.c{color:var(--accent);font-weight:700;font-size:10px;}
  table.dt{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.dt th,table.dt td{padding:7px 8px;text-align:right;border-bottom:1px solid var(--rule2);font-variant-numeric:tabular-nums;}
  table.dt th{background:var(--navy);color:#fff;font-weight:600;font-size:11.5px;}
  table.dt th:first-child,table.dt td:first-child{text-align:left;}
  table.dt td:first-child{color:var(--muted);}
  table.dt tr:last-child td{border-bottom:none;}
  .vtrack{position:relative;height:7px;background:var(--rule);border-radius:5px;margin:30px 0 8px;}
  .vband{position:absolute;height:7px;background:var(--navy);border-radius:5px;opacity:.85;}
  .vt{position:absolute;top:-6px;width:2px;height:19px;background:var(--ink);}
  .vt.base{background:var(--navy);width:3px;} .vt.price{background:var(--amber);}
  .vt .cap{position:absolute;top:-18px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:10.5px;color:var(--muted);}
  .vt.price .cap{color:var(--amber);font-weight:600;}
  .vends{display:flex;justify-content:space-between;font-size:11px;color:var(--faint);}
  .subh{font-weight:700;color:var(--ink);font-size:12.5px;margin:0 0 5px;}
  ul.list{margin:0;padding-left:0;list-style:none;}
  ul.list li{padding:8px 0;border-top:1px solid var(--rule2);font-size:13px;display:flex;gap:9px;}
  ul.list li:first-child{border-top:none;}
  ul.list li .mk{flex:none;color:var(--navy);font-weight:700;}
  .news{display:flex;gap:10px;padding:10px 0;border-top:1px solid var(--rule2);}
  .news:first-of-type{border-top:none;}
  .news .stripe{flex:none;width:3px;border-radius:2px;}
  .stripe.pos{background:var(--green);} .stripe.neg{background:var(--red);} .stripe.neu{background:var(--faint);}
  .news .hd{font-size:13px;color:var(--ink);font-weight:500;line-height:1.4;}
  .news .mt{font-size:11px;color:var(--muted);margin-top:3px;}
  .tag{font-size:9.5px;font-weight:700;text-transform:uppercase;padding:1px 6px;border-radius:4px;margin-left:6px;}
  .tag.pos{background:var(--greenbg);color:var(--green);} .tag.neg{background:var(--redbg);color:var(--red);} .tag.neu{background:var(--rule);color:var(--muted);}
  .cat{display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-top:1px solid var(--rule2);font-size:13px;}
  .cat:first-child{border-top:none;}
  .cat .meta{font-size:11px;color:var(--muted);white-space:nowrap;}
  .chk{display:flex;gap:8px;padding:8px 0;border-top:1px solid var(--rule2);font-size:12.5px;}
  .chk:first-child{border-top:none;}
  .cflag{flex:none;font-size:9.5px;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px;}
  .cflag.ok{background:var(--greenbg);color:var(--green);} .cflag.warning{background:var(--amberbg);color:var(--amber);} .cflag.alert{background:var(--redbg);color:var(--red);}
  .ill{font-size:10.5px;color:var(--faint);font-style:italic;}
  .legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-bottom:4px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:11px;height:3px;border-radius:2px;display:inline-block;}
  /* report view */
  #report{display:none;}
  body.reportmode #dashboard{display:none;}
  body.reportmode #report{display:block;}
  .doc{max-width:840px;margin:18px auto;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,.08);padding:48px 56px;}
  .doc .cover{background:var(--navy);color:#fff;border-radius:4px;padding:38px 30px;text-align:center;margin-bottom:26px;}
  .doc .cover .er{color:#e0a13a;letter-spacing:.18em;font-size:12px;font-weight:600;}
  .doc .cover h1{font-family:Georgia,serif;font-size:34px;margin:8px 0 4px;font-weight:700;}
  .doc .cover .tk{color:#aebfd2;font-size:14px;}
  .doc .cover .rt{color:#e0a13a;font-weight:700;font-size:18px;margin-top:16px;font-family:Georgia,serif;}
  .doc .cover .ct{color:#cdd9e6;font-size:13px;}
  .doc .cover .dt{color:#8ea3bb;font-size:12px;margin-top:10px;}
  .doc h2.s{font-family:Georgia,serif;color:var(--navy);font-size:20px;margin:26px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--rule);}
  .doc h3.s{font-size:14px;color:var(--ink);margin:16px 0 6px;}
  .doc p{line-height:1.7;margin:0 0 11px;font-size:13.5px;}
  .doc .kvbox{border:1px solid #ecdcb8;background:#fcfaf4;border-radius:6px;padding:14px 16px;font-size:13.5px;line-height:1.7;}
  .doc table.dt th{background:#33425a;}
  .doc .disc{margin-top:24px;padding-top:12px;border-top:1px solid var(--rule);color:var(--faint);font-size:10.5px;line-height:1.6;}
  .rtoolbar{max-width:840px;margin:0 auto;display:flex;justify-content:space-between;padding:14px 0 0;}
  @media print{
    .side,.topbar,.rtoolbar,.mockbar{display:none!important;}
    body.reportmode #report{display:block;} .doc{box-shadow:none;margin:0;max-width:none;padding:0;}
    .app{display:block;}
  }
</style>
</head>

</div>

   overview:[`Apple Inc. is a global technology leader spanning hardware, software and a fast-growing services ecosystem — iPhone, iPad, Mac, Apple Watch and AirPods, complemented by the App Store, Apple Music, iCloud, Apple TV+ and Apple Pay. This integrated model fosters loyalty and drives recurring services revenue.`,

     ci:[["Revenue (95%)","$340.1B – $623.3B"],["EBITDA (95%)","$152.4B – $279.3B"]]},
   newsSummary:`Apple is in the spotlight after its 2026 WWDC keynote unveiling an upgraded, AI-powered Siri and tighter Alphabet integration. Despite positive reviews, shares slipped — the market wanted a bigger reveal, and new Siri features won't reach the EU or China immediately. App Store policy changes (delisting low-engagement apps; cross-app subscription bundles) could lift services revenue. Sentiment is split: X strongly positive, Reddit more cautious.<sup class="c">[4]</sup>`,

const pct=x=>(x*100).toFixed(Math.abs(x)>=1?0:1)+"%";
const sgn=x=>(x>=0?"+":"−")+pct(Math.abs(x));
const num=x=>x.toLocaleString(undefined,{maximumFractionDigits:2});

function priceSeries(tk,end,n=44){let h=0;for(const c of tk)h=(h*31+c.charCodeAt(0))>>>0;
  const rnd=()=>{h^=h<<13;h>>>=0;h^=h>>17;h^=h<<5;h>>>=0;return (h>>>0)/4294967296;};
  let v=end*0.82,a=[];for(let i=0;i<n;i++){v*=(1+(rnd()-0.46)*0.03);a.push(v);}const k=end/a[n-1];return a.map(x=>x*k);}
function sparkline(s,up){const w=300,H=110,p=6,lo=Math.min(...s),hi=Math.max(...s),sp=(hi-lo)||1;
  const X=i=>p+i/(s.length-1)*(w-2*p),Y=v=>H-p-((v-lo)/sp)*(H-2*p);
  const pts=s.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  const col=up?"#138a52":"#c43c30",fl=up?"rgba(19,138,82,.10)":"rgba(196,60,48,.10)";
  return `<svg class="spark" viewBox="0 0 ${w} ${H}" preserveAspectRatio="none"><polygon points="${p},${H-p} ${pts} ${w-p},${H-p}" fill="${fl}"/><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="2"/></svg>`;}

function barLine(c){const w=460,H=180,pL=8,pR=8,pT=24,pB=22,iw=w-pL-pR,ih=H-pT-pB;
  const all=c.bars.concat(c.line),mx=Math.max(...all)*1.08;
  const n=c.years.length,bw=iw/n*0.5;
  const X=i=>pL+(i+0.5)/n*iw,Y=v=>pT+ih-(v/mx)*ih;
  let bars=c.bars.map((v,i)=>`<rect x="${X(i)-bw/2}" y="${Y(v)}" width="${bw}" height="${pT+ih-Y(v)}" fill="#1b4a7a" opacity="0.82" rx="2"/>`).join("");
  let pts=c.line.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ");
  let line=`<polyline points="${pts}" fill="none" stroke="#e0a13a" stroke-width="2"/>`+c.line.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="2.6" fill="#e0a13a"/>`).join("");
  let xl=c.years.map((y,i)=>`<text x="${X(i)}" y="${H-7}" font-size="10" fill="#7b8696" text-anchor="middle">${y}</text>`).join("");
  return `<div class="legend"><span><i style="background:#1b4a7a"></i>${c.lblBar}</span><span><i style="background:#e0a13a"></i>${c.lblLine}</span></div>
    <svg viewBox="0 0 ${w} ${H}" width="100%">${bars}${line}${xl}</svg>`;}

function twoLine(c){const w=460,H=180,pL=8,pR=8,pT=24,pB=22,iw=w-pL-pR,ih=H-pT-pB,n=c.years.length;
  const norm=arr=>{const lo=Math.min(...arr),hi=Math.max(...arr),sp=(hi-lo)||1;return arr.map(v=>(v-lo)/sp);};
  const A=norm(c.a),B=norm(c.b),X=i=>pL+(i+0.5)/n*iw,Y=v=>pT+ih-v*ih*0.92;
  const mk=(vals,col)=>`<polyline points="${vals.map((v,i)=>`${X(i).toFixed(1)},${Y(v).toFixed(1)}`).join(" ")}" fill="none" stroke="${col}" stroke-width="2"/>`+vals.map((v,i)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="2.6" fill="${col}"/>`).join("");
  let xl=c.years.map((y,i)=>`<text x="${X(i)}" y="${H-7}" font-size="10" fill="#7b8696" text-anchor="middle">${y}</text>`).join("");
  return `<div class="legend"><span><i style="background:#16202c"></i>${c.la}</span><span><i style="background:#e0a13a"></i>${c.lb}</span></div>
    <svg viewBox="0 0 ${w} ${H}" width="100%">${mk(A,"#16202c")}${mk(B,"#e0a13a")}${xl}</svg>`;}

function dtable(o){return `<table class="dt"><tr><th></th>${o.years.map(y=>`<th>${y}</th>`).join("")}</tr>`+
  o.rows.map(r=>`<tr><td>${r[0]}</td>${r[1].map(v=>`<td>${v}</td>`).join("")}</tr>`).join("")+`</table>`;}

function tilesH(arr){return `<div class="tiles">`+arr.map(([k,v])=>`<div class="tile"><div class="v">${v}</div><div class="k">${k}</div></div>`).join("")+`</div>`;}
function listH(arr,mk){return `<ul class="list">`+arr.map(x=>`<li><span class="mk">${mk}</span><span>${x}</span></li>`).join("")+`</ul>`;}
function newsH(arr){const m={pos:["pos","positive"],neg:["neg","negative"],neu:["neu","neutral"]};
  return arr.map(n=>{const[cl,lb]=m[n.t];return `<div class="news"><div class="stripe ${cl}"></div><div><div class="hd">${n.h}</div><div class="mt">${n.s} · ${n.d}<span class="tag ${cl}">${lb}</span></div></div></div>`;}).join("");}
function checksH(arr){return arr.map(c=>`<div class="chk"><span class="cflag ${c.level}">${c.level}</span><div><b style="color:var(--ink)">${c.code}</b> — ${c.message}</div></div>`).join("");}
function valbar(d){
  if(d.fairLow==null)return `<div style="font-size:13px;color:var(--amber);padding:10px 0">Target withheld — the growth assumption feeding the DCF is flagged by the verification gate. ${d.fairMethod}.</div>`;
  const dmin=Math.min(d.fairLow,d.price),dmax=Math.max(d.fairHigh,d.price),sp=(dmax-dmin)||1,P=x=>((x-dmin)/sp*100);
  return `<div class="vtrack"><div class="vband" style="left:${P(d.fairLow)}%;width:${P(d.fairHigh)-P(d.fairLow)}%"></div>
    <div class="vt base" style="left:${P(d.target)}%"><span class="cap">fair value ${num(d.target)}</span></div>
    <div class="vt price" style="left:${P(d.price)}%"><span class="cap">price ${num(d.price)}</span></div></div>

    <div class="ill" style="margin-top:8px">Method: ${d.fairMethod}.</div>`;}

    Every figure is produced by a deterministic engine; the AI composes the narrative but does not originate numbers. Qualitative claims are grounded in the cited sources, and assumptions are screened by the verification gate above — claims and figures that fail are flagged, not silently published. Illustrative mock data for demonstration only. Not investment advice.</div>

function show(t){CURRENT=t;renderWL(t);renderTop(DATA[t]);renderDash(t);
  if(document.body.classList.contains('reportmode'))renderReport(t);
  window.scrollTo(0,0);}
function openReport(){renderReport(CURRENT);document.body.classList.add('reportmode');window.scrollTo(0,0);}
function closeReport(){document.body.classList.remove('reportmode');window.scrollTo(0,0);}
